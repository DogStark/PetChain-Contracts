name: Celo Contracts CI

on:
  push:
    branches:
      - main
  pull_request:

permissions: read-all

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: celo-contracts
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: celo-contracts/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Compile contracts
        run: npx hardhat compile

      - name: Run tests
        run: npx hardhat test

      - name: Deploy dry run on local network
        run: npx hardhat run scripts/deploy.js --network hardhat
